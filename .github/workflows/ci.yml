name: CI — SRTime Web

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install web dependencies
        run: pip install -r attendance/requirements-web.txt pytest
      - name: Run shared test suite
        run: cd attendance && python -m pytest tests/ -v --tb=short
        env:
          DB_ENGINE: sqlite
          LOG_FORMAT: text

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: attendance/web
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
