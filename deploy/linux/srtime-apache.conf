<VirtualHost *:80>
    ServerName localhost
    # ServerName srtime.tuempresa.com

    # Logs de Apache
    ErrorLog /var/log/srtime/apache-error.log
    CustomLog /var/log/srtime/apache-access.log combined

    # ── Proxy al backend API (FastAPI en puerto 8000) ─────────
    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:8000/api/
    ProxyPassReverse /api/ http://127.0.0.1:8000/api/

    # ── Proxy al frontend (Next.js en puerto 3000) ────────────
    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # WebSocket support (Next.js HMR en desarrollo)
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:3000/$1 [P,L]

    # Headers de seguridad
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # Tamaño máximo de uploads (50 MB para archivos de asistencia)
    LimitRequestBody 52428800
</VirtualHost>
